<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хороший вырез + удаление боковых готово!</title>
<style>
  body {
    background: #090909;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  #dropzone {
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border: 3px dashed #444;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    background: #111;
  }
  #dropzone:hover, #dropzone.dragover {
    border-color: #ff007f;
    background: rgba(255, 0, 127, 0.05);
  }
  #dropzone h1 {
    font-size: 36px;
    margin-bottom: 10px;
    pointer-events: none;
    text-align: center;
    color: #ff007f;
    text-shadow: 0 0 15px rgba(255,0,127,0.4);
  }
  #dropzone p {
    color: #aaa;
    pointer-events: none;
    font-size: 16px;
    text-align: center;
    max-width: 600px;
    line-height: 1.5;
  }

  input[type="file"] { display: none; }

  #result-box {
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 20;
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
  }
  
  canvas {
    max-width: 100%;
    max-height: 75vh;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    background: repeating-conic-gradient(#1a1a1a 0% 25%, #222 0% 50%) 50% / 20px 20px;
  }

  .btn {
    margin-top: 25px;
    padding: 15px 50px;
    background: #ff007f;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 0, 127, 0.6);
  }

  .reset {
    position: fixed;
    top: 20px; right: 20px;
    background: rgba(255,255,255,0.05);
    color: #aaa;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    z-index: 30;
    display: none;
    transition: background 0.2s;
  }
  .reset:hover { background: rgba(255,255,255,0.15); color: #fff; }
</style>
</head>
<body>

<div id="dropzone">
  <h1>🚀 Ultimate Auto-Cutter</h1>
  <p>Кликните или перетащите скриншот.<br>Алгоритм удалит фон, обрезанные края и мусор, сохранив только целые карточки.</p>
</div>

<input type="file" id="file" accept="image/*">

<div id="result-box">
  <canvas id="canvas"></canvas>
  <a id="downloadBtn" class="btn" download="brawl_cards_clean.png">💾 Сохранить PNG</a>
</div>

<div class="reset" id="resetBtn">✕ Загрузить другое фото</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file");
const resultBox = document.getElementById("result-box");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const downloadBtn = document.getElementById("downloadBtn");
const resetBtn = document.getElementById("resetBtn");

dropzone.onclick = () => fileInput.click();
dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add("dragover"); };
dropzone.ondragleave = () => dropzone.classList.remove("dragover");
dropzone.ondrop = (e) => {
  e.preventDefault(); dropzone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) processImage(e.dataTransfer.files[0]);
};
fileInput.onchange = (e) => {
  if (e.target.files[0]) processImage(e.target.files[0]);
};

resetBtn.onclick = () => {
  resultBox.style.display = 'none';
  resetBtn.style.display = 'none';
  dropzone.style.display = 'flex';
  fileInput.value = '';
};

function processImage(file) {
  const img = new Image();
  img.onload = () => runMagic(img);
  img.src = URL.createObjectURL(file);
}

function runMagic(img) {
  dropzone.style.display = 'none';
  resultBox.style.display = 'flex';
  resetBtn.style.display = 'block';

  const w = img.width;
  const h = img.height;
  
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = w; tmpCanvas.height = h;
  const tCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
  tCtx.drawImage(img, 0, 0);
  
  const imgData = tCtx.getImageData(0, 0, w, h);
  const d = imgData.data;

  // ШАГ 1: Жесткие Границы (Щиты карточек)
  const gray = new Uint8Array(w * h);
  for(let i=0; i < w*h; i++) {
    gray[i] = 0.299*d[i*4] + 0.587*d[i*4+1] + 0.114*d[i*4+2];
  }

  const edges = new Uint8Array(w * h);
  const dilated = new Uint8Array(w * h);
  
  for(let y=1; y < h-1; y++) {
    for(let x=1; x < w-1; x++) {
      let i = y*w + x;
      let p00 = gray[(y-1)*w+(x-1)], p02 = gray[(y-1)*w+(x+1)];
      let p10 = gray[y*w+(x-1)],     p12 = gray[y*w+(x+1)];
      let p20 = gray[(y+1)*w+(x-1)], p22 = gray[(y+1)*w+(x+1)];
      let p01 = gray[(y-1)*w+x],     p21 = gray[(y+1)*w+x];

      let gx = -p00 + p02 - 2*p10 + 2*p12 - p20 + p22;
      let gy = -p00 - 2*p01 - p02 + p20 + 2*p21 + p22;
      if (Math.sqrt(gx*gx + gy*gy) > 60) edges[i] = 1; 
    }
  }

  for(let y=2; y < h-2; y++) {
    for(let x=2; x < w-2; x++) {
      if (edges[y*w+x]) {
        for(let dy=-1; dy<=1; dy++) {
          for(let dx=-1; dx<=1; dx++) {
            dilated[(y+dy)*w+(x+dx)] = 1;
          }
        }
      }
    }
  }

  // ШАГ 2: Глубокое сканирование фоновых цветов
  const colorBins = {};
  let sampleCount = 0;
  
  const bandY = Math.floor(h * 0.10);
  const bandX = Math.floor(w * 0.10);

  function sampleArea(startY, endY, startX, endX) {
    for(let y = startY; y < endY; y += 4) {
      for(let x = startX; x < endX; x += 4) {
        let i = (y * w + x) * 4;
        let r = Math.round(d[i]/32)*32;
        let g = Math.round(d[i+1]/32)*32;
        let b = Math.round(d[i+2]/32)*32;
        let key = `${r},${g},${b}`;
        colorBins[key] = (colorBins[key] || 0) + 1;
        sampleCount++;
      }
    }
  }

  sampleArea(0, bandY, 0, w); 
  sampleArea(h - bandY, h, 0, w); 
  sampleArea(bandY, h - bandY, 0, bandX); 
  sampleArea(bandY, h - bandY, w - bandX, w); 

  const targetColors = [];
  const threshold = sampleCount * 0.05; 
  for (const [key, count] of Object.entries(colorBins)) {
    if (count > threshold) {
      targetColors.push(key.split(',').map(Number));
    }
  }

  function isBgColor(r, g, b) {
    for (let tc of targetColors) {
      if (Math.sqrt((r-tc[0])**2 + (g-tc[1])**2 + (b-tc[2])**2) < 70) return true;
    }
    return false;
  }

  // ШАГ 3: Умная заливка с ЗАЩИТОЙ ОБВОДКИ
  const visited = new Uint8Array(w * h);
  const stackX = new Int32Array(w * h);
  const stackY = new Int32Array(w * h);
  let stackLen = 0;

  function tryEraseAndSpread(nx, ny) {
    if (nx < 0 || nx >= w || ny < 0 || ny >= h) return;
    let ni = ny * w + nx;
    if (visited[ni]) return;
    visited[ni] = 1;

    let r = d[ni*4], g = d[ni*4+1], b = d[ni*4+2];

    if (dilated[ni] && r < 75 && g < 75 && b < 75) {
        return;
    }

    if (isBgColor(r, g, b)) {
        d[ni*4+3] = 0; 
        stackX[stackLen] = nx; stackY[stackLen] = ny; stackLen++;
    }
  }

  for(let y=0; y < Math.min(h, 5); y++) {
    for(let x=0; x < w; x++) { tryEraseAndSpread(x, y); tryEraseAndSpread(x, h-1-y); }
  }
  for(let y=0; y < h; y++) {
    for(let x=0; x < Math.min(w, 5); x++) { tryEraseAndSpread(x, y); tryEraseAndSpread(w-1-x, y); }
  }

  while(stackLen > 0) {
    stackLen--;
    let x = stackX[stackLen];
    let y = stackY[stackLen];
    tryEraseAndSpread(x+1, y);
    tryEraseAndSpread(x-1, y);
    tryEraseAndSpread(x, y+1);
    tryEraseAndSpread(x, y-1);
  }

  // ШАГ 4: "ДВОРНИК" - Удаление мусора + Удаление боковых карточек
  const islandIDs = new Int32Array(w * h);
  let currentID = 1;
  // Теперь храним также minX и maxX, чтобы понимать, касается ли объект краев экрана
  const islandRects = [ {minY: h, maxY: 0, minX: w, maxX: 0} ]; // 0 = пусто

  for(let y=0; y < h; y++) {
    for(let x=0; x < w; x++) {
      let i = y * w + x;
      if (d[i*4+3] > 0 && islandIDs[i] === 0) {
        let minY = y, maxY = y, minX = x, maxX = x;
        stackLen = 0;
        stackX[stackLen] = x; stackY[stackLen] = y; stackLen++;
        islandIDs[i] = currentID;

        while(stackLen > 0) {
          stackLen--;
          let cx = stackX[stackLen], cy = stackY[stackLen];
          if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
          if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;

          const check = (nx, ny) => {
            if(nx >= 0 && nx < w && ny >= 0 && ny < h) {
              let ni = ny * w + nx;
              if (d[ni*4+3] > 0 && islandIDs[ni] === 0) {
                islandIDs[ni] = currentID;
                stackX[stackLen] = nx; stackY[stackLen] = ny; stackLen++;
              }
            }
          };
          check(cx+1, cy); check(cx-1, cy); check(cx, cy+1); check(cx, cy-1);
        }
        islandRects.push({minY, maxY, minX, maxX});
        currentID++;
      }
    }
  }

  // Фильтруем оставшиеся пиксели
  for (let i = 0; i < w * h; i++) {
    if (d[i*4+3] > 0) {
      let rect = islandRects[islandIDs[i]];
      let objHeight = rect.maxY - rect.minY;
      
      // Проверяем, касается ли этот кусок левого (<= 5px) или правого (>= w - 5px) края экрана
      let touchesEdges = (rect.minX <= 5 || rect.maxX >= w - 6);

      // Если кусок мелкий ИЛИ он обрезан краем экрана - удаляем его
      if (objHeight < h * 0.30 || touchesEdges) {
        d[i*4+3] = 0; 
      }
    }
  }

  // ШАГ 5: Финальная обрезка (Авто-Кадрирование)
  let minX = w, minY = h, maxX = 0, maxY = 0;
  let hasContent = false;
  
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (d[(y * w + x) * 4 + 3] > 0) {
        hasContent = true;
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }

  if (hasContent) {
    minX = Math.max(0, minX - 10); minY = Math.max(0, minY - 10);
    maxX = Math.min(w - 1, maxX + 10); maxY = Math.min(h - 1, maxY + 10);

    canvas.width = maxX - minX + 1; canvas.height = maxY - minY + 1;
    tCtx.putImageData(imgData, 0, 0);
    ctx.drawImage(tmpCanvas, minX, minY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
  } else {
    canvas.width = w; canvas.height = h;
    ctx.putImageData(imgData, 0, 0);
  }

  downloadBtn.href = canvas.toDataURL("image/png");
}
</script>

</body>
</html>
